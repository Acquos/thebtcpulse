<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1200px;height:630px;overflow:hidden;background:#f0ece7;font-family:'Outfit',sans-serif;position:relative;}

/* Grain */
body::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:50;mix-blend-mode:multiply;}

/* Subtle warm glow */
.glow{position:absolute;top:-20%;right:-10%;width:60%;height:100%;background:radial-gradient(ellipse,rgba(247,147,26,.06) 0%,transparent 55%);pointer-events:none;}

/* Pulse line */
.pulse-svg{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);z-index:1;opacity:.07;}

/* Content layout */
.content{position:relative;z-index:5;display:flex;height:100%;padding:60px 70px;}

/* Left side */
.left{flex:1;display:flex;flex-direction:column;justify-content:center;}

.logo{width:52px;height:52px;border-radius:14px;background:#F7931A;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 4px 16px rgba(247,147,26,.2);}
.logo svg{width:30px;height:30px;}

.title{font-size:54px;font-weight:800;color:#1a1815;letter-spacing:-2.5px;line-height:1.05;}
.title .the{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;color:#F7931A;font-size:40px;margin-right:6px;}

.subtitle{font-size:17px;font-weight:400;color:#8a8580;margin-top:14px;letter-spacing:.5px;}

.hook{margin-top:36px;font-size:28px;font-weight:700;color:#2a2520;letter-spacing:-1px;line-height:1.35;}
.hook .orange{color:#F7931A;}

/* Right side - target cards */
.right{width:340px;display:flex;flex-direction:column;justify-content:center;gap:10px;padding-left:40px;}

.target-card{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:12px;background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.06);backdrop-filter:blur(4px);}
.target-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.target-name{font-size:14px;font-weight:600;color:#3d3a36;letter-spacing:.3px;}
.target-desc{font-size:11px;font-weight:400;color:#8a8580;margin-top:1px;}

.t1 .target-dot{background:#0d7a4a;}
.t2 .target-dot{background:#2aaa6e;}
.t3 .target-dot{background:#5cc496;}
.t4 .target-dot{background:#F7931A;}

/* Bottom bar */
.bottom{position:absolute;bottom:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:center;gap:32px;z-index:5;}
.tag{font-size:12px;font-weight:500;color:#b5b0a9;letter-spacing:.4px;}
.tag .sep{margin:0 12px;color:#d4d0cb;}

.domain{position:absolute;bottom:20px;right:70px;font-size:13px;font-weight:600;color:#b5b0a9;letter-spacing:1.5px;}

/* Top line accent */
.top-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#F7931A,#f5b041,#F7931A);opacity:.7;}

/* Separator */
.sep-line{position:absolute;bottom:60px;left:70px;right:70px;height:1px;background:rgba(0,0,0,.06);z-index:5;}
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="glow"></div>
  
  <!-- Pulse line -->
  <svg class="pulse-svg" viewBox="0 0 1200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 40 L280 40 L340 12 L380 68 L420 12 L460 68 L500 40 L600 40 L650 22 L700 58 L740 40 L1200 40" stroke="#F7931A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  
  <div class="content">
    <div class="left">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none"><path d="M4 16h5l2.5-6 3 12 3-9 2.5 3H26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="title"><span class="the">The</span>BTC Pulse</div>
      <div class="subtitle">Weekly Bitcoin Signal</div>
      <div class="hook">Know where Bitcoin<br>is heading <span class="orange">this week.</span></div>
    </div>
    
    <div class="right">
      <div class="target-card t1">
        <div class="target-dot"></div>
        <div><div class="target-name">Conservative</div><div class="target-desc">Closest target</div></div>
      </div>
      <div class="target-card t2">
        <div class="target-dot"></div>
        <div><div class="target-name">Balanced</div><div class="target-desc">Medium risk/reward</div></div>
      </div>
      <div class="target-card t3">
        <div class="target-dot"></div>
        <div><div class="target-name">Ambitious</div><div class="target-desc">High reward potential</div></div>
      </div>
      <div class="target-card t4">
        <div class="target-dot"></div>
        <div><div class="target-name">Visionary</div><div class="target-desc">Maximum upside</div></div>
      </div>
    </div>
  </div>
  
  <div class="sep-line"></div>
  
  <div class="bottom">
    <span class="tag">Free · No Signup</span>
    <span class="tag">Updated Every Thursday</span>
    <span class="tag">8 Languages</span>
    <span class="tag">Live BTC Price</span>
  </div>
  
  <div class="domain">thebtcpulse.com</div>
</body>
</html>
